<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
        <h1>ROCK-PAPER-SCISSORS</h1>

        <div class="game">
            <button class="box">ROCK</button>
            <button class="box">PAPER</button>
            <button class="box">SCISSORS</button>
        </div>

        <div class="scores">
            <ul>
                <li>YOU</li>
                <li id="you">0</li>
            </ul>
            <ul>
                <li>COMP</li>
                <li id="comp">0</li>
            </ul>
        </div>
        <button id="reset" type="button">RESET</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
